<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SWAGA | CRYPTO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Rubik+Wet+Paint&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Rubik+Glitch&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0A1F0A;
            min-height: 100vh;
            color: white;
            position: relative;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        /* Фоновые буквы */
        .swaga-bg {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.15;
            font-size: 180px;
            font-weight: 900;
            white-space: nowrap;
            transform: rotate(-15deg);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }

        .swaga-bg span {
            display: inline-block;
            margin: 0 30px;
            animation: glow 4s ease-in-out infinite;
        }

        .swaga-bg span:nth-child(odd) {
            color: #000000;
            text-shadow: 0 0 20px rgba(0,255,0,0.5);
        }

        .swaga-bg span:nth-child(even) {
            color: #00FF00;
            text-shadow: 0 0 40px #00FF00;
        }

        @keyframes glow {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 450px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .content {
            flex: 1;
        }

        /* Приветствие */
        .greeting {
            font-size: 18px;
            font-weight: 600;
            color: white;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .greeting span {
            color: #00FF00;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .greeting .wave {
            font-size: 20px;
        }

        #username {
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: inline-block;
            vertical-align: bottom;
        }

        /* Баланс */
        .balance-header {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 0, 0.2);
            border-radius: 30px;
            padding: 20px;
            margin-top: 5px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 255, 0, 0.1);
        }

        .balance-label {
            font-size: 14px;
            color: #00FF00;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            opacity: 0.8;
        }

        .balance-amount {
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        .balance-amount .number {
            font-size: 48px;
            font-weight: 800;
            color: #FFFFFF;
            text-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }

        .balance-amount .currency {
            font-size: 24px;
            font-weight: 600;
            color: #00FF00;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .balance-amount .currency svg {
            width: 24px;
            height: 24px;
        }

        .usd-value {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 5px;
        }

        /* Секция P2P */
        .p2p-section {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(0, 255, 0, 0.15);
            border-radius: 25px;
            text-align: center;
        }

        .p2p-description {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .p2p-description span {
            color: #00FF00;
            font-weight: 600;
        }

        .p2p-description .dollar-icon {
            font-size: 16px;
            margin-right: 4px;
            display: inline-block;
        }

        /* Бунтарская кнопка P2P */
        .p2p-button {
            background: transparent;
            border: none;
            cursor: pointer;
            width: 100%;
            padding: 5px 0;
        }

        .p2p-button-text {
            font-family: 'Orbitron', 'Rajdhani', 'Inter', sans-serif;
            font-size: 42px;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            filter: drop-shadow(0 0 15px rgba(0, 255, 0, 0.5));
            transition: all 0.3s ease;
        }

        .p2p-button:hover .p2p-button-text {
            transform: scale(1.05);
            filter: drop-shadow(0 0 25px #00FF00);
        }

        .p2p-button:active .p2p-button-text {
            transform: scale(0.95);
        }

        .p2p-p {
            color: #000000;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.8);
        }

        .p2p-two {
            color: #00FF00;
            text-shadow: 0 0 20px #00FF00;
        }

        /* Секция SWAG (граффити) */
        .swag-section {
            margin-top: 15px;
            padding: 10px;
            text-align: center;
        }

        .swag-button {
            background: transparent;
            border: none;
            cursor: pointer;
            width: 100%;
        }

        .swag-button-text {
            font-family: 'Rubik Wet Paint', 'Rubik Glitch', cursive;
            font-size: 56px;
            font-weight: 900;
            letter-spacing: 8px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            filter: drop-shadow(0 0 20px rgba(0, 255, 0, 0.6));
            transition: all 0.3s ease;
            transform: rotate(-1deg);
        }

        .swag-button:hover .swag-button-text {
            transform: scale(1.08) rotate(0deg);
            filter: drop-shadow(0 0 30px #00FF00);
        }

        .swag-button:active .swag-button-text {
            transform: scale(0.95) rotate(1deg);
        }

        .swag-s {
            color: #00FF00;
            text-shadow: 3px 3px 0 #000000, 
                         0 0 20px #00FF00;
            transform: rotate(-2deg);
            display: inline-block;
        }

        .swag-w {
            color: #000000;
            text-shadow: 0 0 15px #00FF00,
                        2px 2px 0 #00FF00;
            transform: rotate(1deg);
            display: inline-block;
        }

        .swag-a {
            color: #00FF00;
            text-shadow: -3px 3px 0 #000000,
                         0 0 20px #00FF00;
            transform: rotate(3deg);
            display: inline-block;
        }

        .swag-g {
            color: #000000;
            text-shadow: 0 0 15px #00FF00,
                        -2px -2px 0 #00FF00;
            transform: rotate(-3deg);
            display: inline-block;
        }

        /* Нижняя навигация */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 20, 10, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0, 255, 0, 0.2);
            display: flex;
            justify-content: space-around;
            padding: 12px 10px;
            z-index: 100;
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.5);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 5px 15px;
            border-radius: 15px;
            position: relative;
        }

        .nav-item.active {
            color: #00FF00;
            text-shadow: 0 0 10px #00FF00;
            background: rgba(0, 255, 0, 0.1);
        }

        .nav-icon {
            font-size: 32px;
            filter: drop-shadow(0 0 5px currentColor);
            position: relative;
        }

        /* Радиоактивная молния */
        .lightning-icon {
            position: relative;
            display: inline-block;
            font-size: 32px;
            animation: radioactive 3s infinite;
            filter: drop-shadow(0 0 10px #00FF00) drop-shadow(0 0 20px #00FF00);
        }

        .lightning-icon::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, rgba(0,255,0,0.6) 0%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: slime 4s infinite;
            pointer-events: none;
        }

        @keyframes radioactive {
            0%, 100% { filter: drop-shadow(0 0 5px #00FF00) drop-shadow(0 0 10px #00FF00); }
            50% { filter: drop-shadow(0 0 20px #00FF00) drop-shadow(0 0 40px #00FF00); }
        }

        @keyframes slime {
            0%, 100% { 
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0.6;
            }
            50% { 
                transform: translate(-50%, 20%) scale(1.2);
                opacity: 0.3;
            }
        }

        /* Статистика — два баллончика */
        .stats-icon {
            position: relative;
            display: flex;
            gap: 2px;
            align-items: center;
            justify-content: center;
        }

        .spray-can-green {
            font-size: 24px;
            transform: rotate(-15deg) scaleX(-1);
            color: #00FF00;
            filter: drop-shadow(0 0 8px #00FF00);
            animation: wobble-left 3s infinite;
        }

        .spray-can-red {
            font-size: 24px;
            transform: rotate(15deg);
            color: #FF3333;
            filter: drop-shadow(0 0 8px #FF3333);
            animation: wobble-right 3s infinite;
        }

        @keyframes wobble-left {
            0%, 100% { transform: rotate(-15deg) scaleX(-1); }
            50% { transform: rotate(-20deg) scaleX(-1); }
        }

        @keyframes wobble-right {
            0%, 100% { transform: rotate(15deg); }
            50% { transform: rotate(20deg); }
        }

        /* Профиль — чел с тату */
        .profile-icon {
            position: relative;
            display: inline-block;
            font-size: 32px;
            filter: drop-shadow(0 0 5px rgba(0,255,0,0.5));
        }

        .profile-icon::after {
            content: '$WAG';
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Rubik Glitch', cursive;
            font-size: 8px;
            color: #00FF00;
            text-shadow: 0 0 5px #00FF00;
            white-space: nowrap;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        .nav-label {
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .nav-item:hover {
            color: #00FF00;
            transform: translateY(-2px);
        }

        .nav-item:active {
            transform: translateY(0);
        }

        .page {
            display: none;
        }

        .page.active-page {
            display: block;
        }

        .stats-placeholder, .profile-placeholder {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 16px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            margin-top: 30px;
            border: 1px dashed rgba(0, 255, 0, 0.3);
        }

        .stats-placeholder span, .profile-placeholder span {
            color: #00FF00;
            font-size: 48px;
            display: block;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <!-- Фоновые буквы -->
    <div class="swaga-bg">
        <span>S</span><span>W</span><span>A</span><span>G</span><span>A</span>
        <span>S</span><span>W</span><span>A</span><span>G</span><span>A</span>
        <span>S</span><span>W</span><span>A</span><span>G</span><span>A</span>
        <span>S</span><span>W</span><span>A</span><span>G</span><span>A</span>
    </div>

    <div class="container">
        <!-- Страница WORK -->
        <div id="workPage" class="page active-page">
            <div class="greeting">
                <span class="wave">👋</span>
                <span>whats up,</span>
                <span id="username">bro</span>
            </div>

            <div class="balance-header">
                <div class="balance-label">Твой баланс</div>
                <div class="balance-amount">
                    <span class="number" id="balance">0</span>
                    <span class="currency">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#00FF00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M2 17L12 22L22 17" stroke="#00FF00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M2 12L12 17L22 12" stroke="#00FF00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        USDT
                    </span>
                </div>
                <div class="usd-value" id="usdBalance">$0 USD</div>
            </div>

            <div class="p2p-section">
                <div class="p2p-description">
                    <span class="dollar-icon">💱</span> Здесь вы можете обменять свою <span>SWAGA</span> на доллары или наоборот
                </div>
                <button class="p2p-button" onclick="openP2P()">
                    <div class="p2p-button-text">
                        <span class="p2p-p">P</span>
                        <span class="p2p-two">2</span>
                        <span class="p2p-p">P</span>
                    </div>
                </button>
            </div>

            <div class="swag-section">
                <button class="swag-button" onclick="openSWAG()">
                    <div class="swag-button-text">
                        <span class="swag-s">S</span>
                        <span class="swag-w">W</span>
                        <span class="swag-a">A</span>
                        <span class="swag-g">G</span>
                    </div>
                </button>
            </div>
        </div>

        <!-- Страница STATS -->
        <div id="statsPage" class="page">
            <div class="stats-placeholder">
                <span>📊</span>
                STATISTICA<br>
                <small style="font-size: 14px; color: rgba(255,255,255,0.3);">coming soon</small>
            </div>
        </div>

        <!-- Страница PROFILE -->
        <div id="profilePage" class="page">
            <div class="profile-placeholder">
                <span>👤</span>
                PROFILE<br>
                <small style="font-size: 14px; color: rgba(255,255,255,0.3);">coming soon</small>
            </div>
        </div>
    </div>

    <!-- Нижняя навигация с новыми иконками -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchPage('work')">
            <span class="nav-icon">
                <span class="lightning-icon">⚡</span>
            </span>
            <span class="nav-label">WORK</span>
        </div>
        <div class="nav-item" onclick="switchPage('stats')">
            <span class="nav-icon">
                <span class="stats-icon">
                    <span class="spray-can-green">🖍️</span>
                    <span class="spray-can-red">🖍️</span>
                </span>
            </span>
            <span class="nav-label">STATS</span>
        </div>
        <div class="nav-item" onclick="switchPage('profile')">
            <span class="nav-icon">
                <span class="profile-icon">👨‍🎨</span>
            </span>
            <span class="nav-label">PROFILE</span>
        </div>
    </div>

    <script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();

        let userId = null;
        const user = Telegram.WebApp.initDataUnsafe?.user;

        const usernameEl = document.getElementById('username');
        if (user) {
            userId = user.id;
            let name = user.first_name || 'bro';
            if (name.length > 15) {
                name = name.substring(0, 12) + '...';
            }
            usernameEl.textContent = name;
        } else {
            userId = 'guest_' + Date.now();
            usernameEl.textContent = 'bro';
        }

        const SERVER_URL = 'https://balance-server-production.up.railway.app';
        
        const balanceEl = document.getElementById('balance');
        const usdEl = document.getElementById('usdBalance');

        async function loadBalance() {
            try {
                const res = await fetch(`${SERVER_URL}/balance/${userId}`);
                const data = await res.json();
                balanceEl.textContent = data.balance;
                usdEl.textContent = `$${data.balance} USD`;
            } catch (e) {
                console.error('Ошибка загрузки баланса', e);
            }
        }

        async function addMoney() {
            try {
                const res = await fetch(`${SERVER_URL}/balance/${userId}/add/100`, {
                    method: 'POST'
                });
                const data = await res.json();
                balanceEl.textContent = data.balance;
                usdEl.textContent = `$${data.balance} USD`;
            } catch (e) {
                console.error('Ошибка добавления', e);
            }
        }

        function refreshBalance() {
            loadBalance();
        }

        function openP2P() {
            alert('🚀 P2P скоро появится');
        }

        function openSWAG() {
            alert('🎨 SWAG MENU скоро появится');
        }

        function switchPage(page) {
            document.getElementById('workPage').classList.remove('active-page');
            document.getElementById('statsPage').classList.remove('active-page');
            document.getElementById('profilePage').classList.remove('active-page');
            
            document.getElementById(page + 'Page').classList.add('active-page');
            
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            event.currentTarget.classList.add('active');
        }

        loadBalance();

        window.addMoney = addMoney;
        window.refreshBalance = refreshBalance;
        window.openP2P = openP2P;
        window.openSWAG = openSWAG;
        window.switchPage = switchPage;
    </script>
</body>
</html>
