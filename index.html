<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SWAGA | CRYPTO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0A1F0A;
            min-height: 100vh;
            color: white;
            position: relative;
            overflow-x: hidden;
        }

        /* Исправленный фон с буквами */
        .swaga-bg {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.15;
            font-size: 180px;
            font-weight: 900;
            white-space: nowrap;
            transform: rotate(-15deg);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }

        .swaga-bg span {
            display: inline-block;
            margin: 0 30px;
            animation: glow 4s ease-in-out infinite;
        }

        .swaga-bg span:nth-child(odd) {
            color: #000000;
            text-shadow: 0 0 20px rgba(0,255,0,0.5);
        }

        .swaga-bg span:nth-child(even) {
            color: #00FF00;
            text-shadow: 0 0 40px #00FF00;
        }

        @keyframes glow {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 450px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Обновленное приветствие */
        .greeting {
            font-size: 24px;
            font-weight: 700;
            color: white;
            margin-bottom: 20px;
            padding-left: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .greeting span {
            color: #00FF00;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .greeting .wave {
            font-size: 28px;
        }

        .balance-header {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 0, 0.2);
            border-radius: 30px;
            padding: 20px;
            margin-top: 10px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 255, 0, 0.1);
        }

        .balance-label {
            font-size: 14px;
            color: #00FF00;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            opacity: 0.8;
        }

        .balance-amount {
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        .balance-amount .number {
            font-size: 48px;
            font-weight: 800;
            color: #FFFFFF;
            text-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }

        .balance-amount .currency {
            font-size: 24px;
            font-weight: 600;
            color: #00FF00;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .balance-amount .currency svg {
            width: 24px;
            height: 24px;
        }

        .usd-value {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 5px;
        }

        .temp-note {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
            border-top: 1px solid rgba(0, 255, 0, 0.2);
        }

        /* Кнопки скоро будут */
        .coming-soon {
            margin-top: auto;
            text-align: center;
            color: rgba(255, 255, 255, 0.2);
            font-size: 12px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <!-- Фоновые буквы SWAGA (теперь видны полностью) -->
    <div class="swaga-bg">
        <span>S</span><span>W</span><span>A</span><span>G</span><span>A</span>
        <span>S</span><span>W</span><span>A</span><span>G</span><span>A</span>
        <span>S</span><span>W</span><span>A</span><span>G</span><span>A</span>
        <span>S</span><span>W</span><span>A</span><span>G</span><span>A</span>
    </div>

    <div class="container">
        <!-- Приветствие "Whats up" -->
        <div class="greeting">
            <span class="wave">👋</span>
            <span>whats up,</span>
            <span id="username">bro</span>
        </div>

        <!-- Баланс как в Tonkeeper -->
        <div class="balance-header">
            <div class="balance-label">Твой баланс</div>
            <div class="balance-amount">
                <span class="number" id="balance">0</span>
                <span class="currency">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#00FF00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 17L12 22L22 17" stroke="#00FF00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 12L12 17L22 12" stroke="#00FF00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    USDT
                </span>
            </div>
            <div class="usd-value" id="usdBalance">$0 USD</div>
        </div>

        <!-- Временная заметка -->
        <div class="temp-note">
            🚀 кнопки скоро появятся
        </div>
        
        <div class="coming-soon">
            SWAGA · CRYPTO
        </div>
    </div>

    <script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();

        let userId = null;
        const user = Telegram.WebApp.initDataUnsafe?.user;

        // Обновленное приветствие
        const usernameEl = document.getElementById('username');
        if (user) {
            userId = user.id;
            usernameEl.textContent = user.first_name || 'bro';
        } else {
            userId = 'guest_' + Date.now();
            usernameEl.textContent = 'bro';
        }

        // ======================================
        // ==== ТУТ ВСЯ ТВОЯ ЛОГИКА ОСТАЛАСЬ ====
        // ======================================
        const SERVER_URL = 'https://balance-server-production.up.railway.app';
        
        const balanceEl = document.getElementById('balance');
        const usdEl = document.getElementById('usdBalance');

        async function loadBalance() {
            try {
                const res = await fetch(`${SERVER_URL}/balance/${userId}`);
                const data = await res.json();
                balanceEl.textContent = data.balance;
                usdEl.textContent = `$${data.balance} USD`;
            } catch (e) {
                console.error('Ошибка загрузки баланса', e);
            }
        }

        async function addMoney() {
            try {
                const res = await fetch(`${SERVER_URL}/balance/${userId}/add/100`, {
                    method: 'POST'
                });
                const data = await res.json();
                balanceEl.textContent = data.balance;
                usdEl.textContent = `$${data.balance} USD`;
            } catch (e) {
                console.error('Ошибка добавления', e);
            }
        }

        function refreshBalance() {
            loadBalance();
        }

        // Загружаем баланс
        loadBalance();

        // Делаем функции глобальными для кнопок
        window.addMoney = addMoney;
        window.refreshBalance = refreshBalance;
    </script>
</body>
</html>
