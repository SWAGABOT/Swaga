<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SWAGA | CRYPTO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0A1F0A;  /* Темно-зеленый фон */
            min-height: 100vh;
            color: white;
            position: relative;
            overflow-x: hidden;
        }

        /* Анимированный фон с буквами SWAGA */
        .swaga-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.15;
            font-size: 120px;
            font-weight: 900;
            white-space: nowrap;
            line-height: 1.2;
            transform: rotate(-15deg) scale(1.5);
        }

        .swaga-bg span {
            display: inline-block;
            margin-right: 20px;
        }

        .swaga-bg span:nth-child(odd) {
            color: #000000;  /* Черный */
            text-shadow: 0 0 20px rgba(0,255,0,0.3);
        }

        .swaga-bg span:nth-child(even) {
            color: #00FF00;  /* Свело-зеленый */
            text-shadow: 0 0 30px #00FF00;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 450px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Хедер с балансом как в Tonkeeper */
        .balance-header {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 0, 0.2);
            border-radius: 30px;
            padding: 20px;
            margin-top: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 255, 0, 0.1);
        }

        .balance-label {
            font-size: 14px;
            color: #00FF00;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            opacity: 0.8;
        }

        .balance-amount {
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        .balance-amount .number {
            font-size: 48px;
            font-weight: 800;
            color: #FFFFFF;
            text-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }

        .balance-amount .currency {
            font-size: 24px;
            font-weight: 600;
            color: #00FF00;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .balance-amount .currency svg {
            width: 24px;
            height: 24px;
        }

        .usd-value {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 5px;
        }

        /* Приветствие */
        .greeting {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 10px;
            padding-left: 5px;
        }

        .greeting span {
            color: #00FF00;
            font-weight: 700;
        }

        /* Кнопки пока минимальные */
        .temp-note {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
            border-top: 1px solid rgba(0, 255, 0, 0.2);
        }

        /* Анимация для фона */
        @keyframes glow {
            0%, 100% { opacity: 0.15; }
            50% { opacity: 0.2; }
        }

        .swaga-bg {
            animation: glow 4s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <!-- Фоновые буквы SWAGA -->
    <div class="swaga-bg" id="swagaBg">
        <span>S</span><span>W</span><span>A</span><span>G</span><span>A</span>
        <span>S</span><span>W</span><span>A</span><span>G</span><span>A</span>
        <span>S</span><span>W</span><span>A</span><span>G</span><span>A</span>
    </div>

    <div class="container">
        <!-- Приветствие -->
        <div class="greeting" id="greeting">
            Загрузка...
        </div>

        <!-- Баланс как в Tonkeeper -->
        <div class="balance-header">
            <div class="balance-label">Твой баланс</div>
            <div class="balance-amount">
                <span class="number" id="balance">0</span>
                <span class="currency">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#00FF00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 17L12 22L22 17" stroke="#00FF00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 12L12 17L22 12" stroke="#00FF00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    USDT
                </span>
            </div>
            <div class="usd-value" id="usdBalance">$0 USD</div>
        </div>

        <!-- Временная заметка -->
        <div class="temp-note">
            ⚡ Дизайн в разработке ⚡<br>
            Следом добавим кнопки
        </div>
    </div>

    <script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();

        let userId = null;
        const user = Telegram.WebApp.initDataUnsafe?.user;

        // Приветствие
        const greetingEl = document.getElementById('greeting');
        if (user) {
            userId = user.id;
            greetingEl.innerHTML = `👋 Привет, <span>${user.first_name || 'Игрок'}</span>`;
        } else {
            userId = 'guest_' + Date.now();
            greetingEl.innerHTML = `👋 Добро пожаловать в <span>SWAGA</span>`;
        }

        // Временный баланс (потом подключим сервер)
        const balanceEl = document.getElementById('balance');
        const usdEl = document.getElementById('usdBalance');

        function updateBalance(val) {
            balanceEl.textContent = val;
            usdEl.textContent = `$${val} USD`;
        }

        // Тестовый баланс 1337 (как в Tonkeeper стиль)
        updateBalance(1337);

        // Эффект появления
        setTimeout(() => {
            document.querySelector('.balance-header').style.opacity = '1';
        }, 100);
    </script>
</body>
</html>
