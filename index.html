<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swaga Crypto</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial;
            background: #1a1a2e;
            color: white;
            text-align: center;
        }
        h1 {
            color: gold;
        }
        .balance {
            font-size: 48px;
            margin: 30px;
            padding: 20px;
            background: #16213e;
            border-radius: 20px;
        }
        button {
            padding: 15px 30px;
            margin: 10px;
            background: #0f3460;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>💰 Swaga Crypto</h1>
    <p id="user">Загрузка...</p>
    <div class="balance" id="balance">0</div>
    <button onclick="addMoney()">➕ Добавить 100</button>
    <button onclick="refreshBalance()">🔄 Обновить</button>

    <script>
        // ======================================
        // ==== НАСТРОЙКИ =======================
        // ======================================
        const SERVER_URL = 'https://balance-server.up.railway.app'; // ЗДЕСЬ ТВОЙ СЕРВЕР

        // ======================================
        // ==== TELEGRAM WEB APP =================
        // ======================================
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();

        let userId = null;
        const user = Telegram.WebApp.initDataUnsafe?.user;

        if (user) {
            userId = user.id;
            document.getElementById('user').textContent = 'Привет, ' + user.first_name;
            loadBalance();
        } else {
            document.getElementById('user').textContent = 'Режим гостя';
            userId = 'guest_' + Date.now();
            loadBalance();
        }

        // ======================================
        // ==== РАБОТА С БАЛАНСОМ (СЕРВЕР) ======
        // ======================================

        async function loadBalance() {
            try {
                const res = await fetch(`${SERVER_URL}/balance/${userId}`);
                const data = await res.json();
                document.getElementById('balance').textContent = data.balance;
            } catch (e) {
                console.error('Ошибка загрузки баланса', e);
            }
        }

        async function addMoney() {
            try {
                const res = await fetch(`${SERVER_URL}/balance/${userId}/add/100`, {
                    method: 'POST'
                });
                const data = await res.json();
                document.getElementById('balance').textContent = data.balance;
            } catch (e) {
                console.error('Ошибка добавления', e);
            }
        }

        function refreshBalance() {
            loadBalance();
        }
    </script>
</body>
</html>
