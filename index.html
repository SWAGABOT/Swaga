<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SWAGA | CRYPTO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Rubik+Wet+Paint&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Rubik+Glitch&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0A1F0A;
            min-height: 100vh;
            color: white;
            position: relative;
            overflow-x: hidden;
        }

        /* Фоновые буквы */
        .swaga-bg {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.15;
            font-size: 180px;
            font-weight: 900;
            white-space: nowrap;
            transform: rotate(-15deg);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }

        .swaga-bg span {
            display: inline-block;
            margin: 0 30px;
            animation: glow 4s ease-in-out infinite;
        }

        .swaga-bg span:nth-child(odd) {
            color: #000000;
            text-shadow: 0 0 20px rgba(0,255,0,0.5);
        }

        .swaga-bg span:nth-child(even) {
            color: #00FF00;
            text-shadow: 0 0 40px #00FF00;
        }

        @keyframes glow {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 450px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Приветствие */
        .greeting {
            font-size: 18px;
            font-weight: 600;
            color: white;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .greeting span {
            color: #00FF00;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .greeting .wave {
            font-size: 20px;
        }

        #username {
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: inline-block;
            vertical-align: bottom;
        }

        /* Баланс */
        .balance-header {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 0, 0.2);
            border-radius: 30px;
            padding: 20px;
            margin-top: 5px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 255, 0, 0.1);
        }

        .balance-label {
            font-size: 14px;
            color: #00FF00;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            opacity: 0.8;
        }

        .balance-amount {
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        .balance-amount .number {
            font-size: 48px;
            font-weight: 800;
            color: #FFFFFF;
            text-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }

        .balance-amount .currency {
            font-size: 24px;
            font-weight: 600;
            color: #00FF00;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .balance-amount .currency svg {
            width: 24px;
            height: 24px;
        }

        .usd-value {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 5px;
        }

        /* Секция P2P */
        .p2p-section {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(0, 255, 0, 0.15);
            border-radius: 25px;
            text-align: center;
        }

        .p2p-description {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .p2p-description span {
            color: #00FF00;
            font-weight: 600;
        }

        .p2p-description .dollar-icon {
            font-size: 16px;
            margin-right: 4px;
            display: inline-block;
        }

        /* Бунтарская кнопка P2P */
        .p2p-button {
            background: transparent;
            border: none;
            cursor: pointer;
            width: 100%;
            padding: 5px 0;
        }

        .p2p-button-text {
            font-family: 'Orbitron', 'Rajdhani', 'Inter', sans-serif;
            font-size: 42px;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            filter: drop-shadow(0 0 15px rgba(0, 255, 0, 0.5));
            transition: all 0.3s ease;
        }

        .p2p-button:hover .p2p-button-text {
            transform: scale(1.05);
            filter: drop-shadow(0 0 25px #00FF00);
        }

        .p2p-button:active .p2p-button-text {
            transform: scale(0.95);
        }

        .p2p-p {
            color: #000000;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.8);
        }

        .p2p-two {
            color: #00FF00;
            text-shadow: 0 0 20px #00FF00;
        }

        /* Секция SWAG (граффити) */
        .swag-section {
            margin-top: 15px;
            padding: 10px;
            text-align: center;
        }

        .swag-button {
            background: transparent;
            border: none;
            cursor: pointer;
            width: 100%;
        }

        .swag-button-text {
            font-family: 'Rubik Wet Paint', 'Rubik Glitch', cursive;
            font-size: 56px;
            font-weight: 900;
            letter-spacing: 8px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            filter: drop-shadow(0 0 20px rgba(0, 255, 0, 0.6));
            transition: all 0.3s ease;
            transform: rotate(-1deg);
        }

        .swag-button:hover .swag-button-text {
            transform: scale(1.08) rotate(0deg);
            filter: drop-shadow(0 0 30px #00FF00);
        }

        .swag-button:active .swag-button-text {
            transform: scale(0.95) rotate(1deg);
        }

        .swag-s {
            color: #00FF00;
            text-shadow: 3px 3px 0 #000000, 
                         0 0 20px #00FF00;
            transform: rotate(-2deg);
            display: inline-block;
        }

        .swag-w {
            color: #000000;
            text-shadow: 0 0 15px #00FF00,
                        2px 2px 0 #00FF00;
            transform: rotate(1deg);
            display: inline-block;
        }

        .swag-a {
            color: #00FF00;
            text-shadow: -3px 3px 0 #000000,
                         0 0 20px #00FF00;
            transform: rotate(3deg);
            display: inline-block;
        }

        .swag-g {
            color: #000000;
            text-shadow: 0 0 15px #00FF00,
                        -2px -2px 0 #00FF00;
            transform: rotate(-3deg);
            display: inline-block;
        }

        /* Подвал */
        .footer {
            margin-top: auto;
            text-align: center;
            color: rgba(255, 255, 255, 0.2);
            font-size: 12px;
            letter-spacing: 2px;
            padding: 20px 0 10px;
        }
    </style>
</head>
    <body>
    <!-- Фоновые буквы -->
    <div class="swaga-bg">
        <span>S</span><span>W</span><span>A</span><span>G</span><span>A</span>
        <span>S</span><span>W</span><span>A</span><span>G</span><span>A</span>
        <span>S</span><span>W</span><span>A</span><span>G</span><span>A</span>
        <span>S</span><span>W</span><span>A</span><span>G</span><span>A</span>
    </div>

    <div class="container">
        <!-- Приветствие -->
        <div class="greeting">
            <span class="wave">👋</span>
            <span>whats up,</span>
            <span id="username">bro</span>
        </div>

        <!-- Баланс -->
        <div class="balance-header">
            <div class="balance-label">Твой баланс</div>
            <div class="balance-amount">
                <span class="number" id="balance">0</span>
                <span class="currency">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#00FF00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 17L12 22L22 17" stroke="#00FF00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 12L12 17L22 12" stroke="#00FF00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    USDT
                </span>
            </div>
            <div class="usd-value" id="usdBalance">$0 USD</div>
        </div>

        <!-- P2P секция -->
        <div class="p2p-section">
            <div class="p2p-description">
                <span class="dollar-icon">💱</span> Здесь вы можете обменять свою <span>SWAGA</span> на доллары или наоборот
            </div>
            <button class="p2p-button" onclick="openP2P()">
                <div class="p2p-button-text">
                    <span class="p2p-p">P</span>
                    <span class="p2p-two">2</span>
                    <span class="p2p-p">P</span>
                </div>
            </button>
        </div>

        <!-- SWAG секция (граффити) -->
        <div class="swag-section">
            <button class="swag-button" onclick="openSWAG()">
                <div class="swag-button-text">
                    <span class="swag-s">S</span>
                    <span class="swag-w">W</span>
                    <span class="swag-a">A</span>
                    <span class="swag-g">G</span>
                </div>
            </button>
        </div>
        
        <!-- Подвал -->
        <div class="footer">
            SWAGA · CRYPTO
        </div>
    </div>

    <script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();

        let userId = null;
        const user = Telegram.WebApp.initDataUnsafe?.user;

        const usernameEl = document.getElementById('username');
        if (user) {
            userId = user.id;
            let name = user.first_name || 'bro';
            if (name.length > 15) {
                name = name.substring(0, 12) + '...';
            }
            usernameEl.textContent = name;
        } else {
            userId = 'guest_' + Date.now();
            usernameEl.textContent = 'bro';
        }

        const SERVER_URL = 'https://balance-server-production.up.railway.app';
        
        const balanceEl = document.getElementById('balance');
        const usdEl = document.getElementById('usdBalance');

        async function loadBalance() {
            try {
                const res = await fetch(`${SERVER_URL}/balance/${userId}`);
                const data = await res.json();
                balanceEl.textContent = data.balance;
                usdEl.textContent = `$${data.balance} USD`;
            } catch (e) {
                console.error('Ошибка загрузки баланса', e);
            }
        }

        async function addMoney() {
            try {
                const res = await fetch(`${SERVER_URL}/balance/${userId}/add/100`, {
                    method: 'POST'
                });
                const data = await res.json();
                balanceEl.textContent = data.balance;
                usdEl.textContent = `$${data.balance} USD`;
            } catch (e) {
                console.error('Ошибка добавления', e);
            }
        }

        function refreshBalance() {
            loadBalance();
        }

        function openP2P() {
            alert('🚀 P2P скоро появится');
        }

        function openSWAG() {
            alert('🎨 SWAG MENU скоро появится');
        }

        loadBalance();

        window.addMoney = addMoney;
        window.refreshBalance = refreshBalance;
        window.openP2P = openP2P;
        window.openSWAG = openSWAG;
    </script>
</body>
</html>
