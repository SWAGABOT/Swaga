<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWAGA | ADMIN</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: #0A1F0A;
            color: white;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #00FF00;
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 30px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #00FF00;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        .stat-label {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            margin-bottom: 10px;
        }
        .stat-value {
            color: #00FF00;
            font-size: 28px;
            font-weight: bold;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            overflow: hidden;
        }
        th {
            background: #00FF00;
            color: #0A1F0A;
            padding: 15px;
            text-align: left;
        }
        td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(0, 255, 0, 0.2);
        }
        tr:hover {
            background: rgba(0, 255, 0, 0.1);
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: rgba(255,255,255,0.5);
        }
        .error {
            color: #FF3333;
            text-align: center;
            padding: 20px;
        }
        .footer {
            margin-top: 30px;
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👑 SWAGA ADMIN PANEL</h1>
        
        <div id="stats" class="stats-grid"></div>
        
        <h2 style="color: #00FF00; margin: 30px 0 20px;">📋 ВСЕ ПОЛЬЗОВАТЕЛИ</h2>
        
        <div id="users-table"></div>
        
        <div class="footer">
            Только для авторизованных администраторов
        </div>
    </div>

    <script>
        const SERVER_URL = 'https://balance-server-production.up.railway.app';
        
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();

        const user = Telegram.WebApp.initDataUnsafe?.user;
        
        async function loadAdminData() {
            if (!user) {
                document.getElementById('users-table').innerHTML = '<div class="error">❌ Ошибка: не удалось получить данные пользователя</div>';
                return;
            }

            const userId = user.id.toString();
            
            try {
                // Загружаем общую статистику
                const statsRes = await fetch(`${SERVER_URL}/admin/stats?user_id=${userId}`);
                const statsData = await statsRes.json();
                
                if (statsData.error) {
                    document.getElementById('stats').innerHTML = `<div class="error">❌ ${statsData.error}</div>`;
                    return;
                }
                
                // Отображаем статистику
                document.getElementById('stats').innerHTML = `
                    <div class="stat-card">
                        <div class="stat-label">Всего пользователей</div>
                        <div class="stat-value">${statsData.total_users}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Всего USDT</div>
                        <div class="stat-value">$${statsData.total_usdt.toFixed(2)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Всего SWAG</div>
                        <div class="stat-value">${statsData.total_swag.toFixed(2)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Активных ордеров</div>
                        <div class="stat-value">${statsData.active_orders}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Всего сделок</div>
                        <div class="stat-value">${statsData.total_trades}</div>
                    </div>
                `;
                
                // Загружаем список пользователей
                const usersRes = await fetch(`${SERVER_URL}/admin/users?user_id=${userId}`);
                const usersData = await usersRes.json();
                
                if (usersData.error) {
                    document.getElementById('users-table').innerHTML = `<div class="error">❌ ${usersData.error}</div>`;
                    return;
                }
                
                // Отображаем таблицу пользователей
                let tableHtml = `
                    <table>
                        <thead>
                            <tr>
                                <th>ID пользователя</th>
                                <th>USDT</th>
                                <th>SWAG</th>
                                <th>USDT (заморожено)</th>
                                <th>SWAG (заморожено)</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                usersData.users.forEach(user => {
                    tableHtml += `
                        <tr>
                            <td>${user.user_id}</td>
                            <td>$${user.usdt.toFixed(2)}</td>
                            <td>${user.swag.toFixed(2)}</td>
                            <td>$${user.usdt_frozen.toFixed(2)}</td>
                            <td>${user.swag_frozen.toFixed(2)}</td>
                        </tr>
                    `;
                });
                
                tableHtml += `
                        </tbody>
                    </table>
                `;
                
                document.getElementById('users-table').innerHTML = tableHtml;
                
            } catch (e) {
                console.error('Ошибка загрузки админ-панели:', e);
                document.getElementById('users-table').innerHTML = '<div class="error">❌ Ошибка загрузки данных</div>';
            }
        }
        
        loadAdminData();
        setInterval(loadAdminData, 30000); // Обновляем каждые 30 секунд
    </script>
</body>
</html>
