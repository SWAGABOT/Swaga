<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWAGA | ADMIN</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: #0A1F0A;
            color: white;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #00FF00;
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 30px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #00FF00;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        .stat-label {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            margin-bottom: 10px;
        }
        .stat-value {
            color: #00FF00;
            font-size: 28px;
            font-weight: bold;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            overflow: hidden;
        }
        th {
            background: #00FF00;
            color: #0A1F0A;
            padding: 15px;
            text-align: left;
        }
        td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(0, 255, 0, 0.2);
        }
        tr:hover {
            background: rgba(0, 255, 0, 0.1);
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: rgba(255,255,255,0.5);
        }
        .error {
            color: #FF3333;
            text-align: center;
            padding: 20px;
        }
        .footer {
            margin-top: 30px;
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 12px;
        }
        .manual-input {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #00FF00;
            border-radius: 15px;
            padding: 20px;
        }
        .manual-input input {
            flex: 1;
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #00FF00;
            border-radius: 10px;
            color: white;
            font-size: 16px;
        }
        .manual-input button {
            padding: 12px 25px;
            background: #00FF00;
            color: #0A1F0A;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }
        .manual-input button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #00FF00;
        }
        .info-box {
            background: rgba(0, 255, 0, 0.1);
            border-left: 4px solid #00FF00;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👑 SWAGA ADMIN PANEL</h1>
        
        <div class="info-box" id="userInfo">
            Загрузка данных пользователя...
        </div>
        
        <div class="manual-input">
            <input type="text" id="manualUserId" placeholder="Или введи Telegram ID вручную" value="1346528897">
            <button onclick="loadWithManualId()">Войти</button>
        </div>
        
        <div id="stats" class="stats-grid"></div>
        
        <h2 style="color: #00FF00; margin: 30px 0 20px;">📋 ВСЕ ПОЛЬЗОВАТЕЛИ</h2>
        
        <div id="users-table"></div>
        
        <div class="footer">
            Только для авторизованных администраторов
        </div>
    </div>

    <script>
        const SERVER_URL = 'https://balance-server-production.up.railway.app';
        
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();

        let currentUserId = null;
        const user = Telegram.WebApp.initDataUnsafe?.user;

        // Отображаем информацию о пользователе
        const userInfo = document.getElementById('userInfo');
        
        if (user) {
            currentUserId = user.id.toString();
            userInfo.innerHTML = `✅ Вошел как: <strong>${user.first_name}</strong> (ID: ${currentUserId})`;
        } else {
            userInfo.innerHTML = `⚠️ Не удалось получить данные из Telegram. Используй ручной ввод.`;
        }

        async function loadAdminData(targetUserId) {
            if (!targetUserId) {
                document.getElementById('users-table').innerHTML = '<div class="error">❌ Нет ID пользователя</div>';
                return;
            }

            try {
                // Загружаем общую статистику
                const statsRes = await fetch(`${SERVER_URL}/admin/stats?user_id=${targetUserId}`);
                const statsData = await statsRes.json();
                
                if (statsData.error) {
                    document.getElementById('stats').innerHTML = `<div class="error">❌ ${statsData.error}</div>`;
                    document.getElementById('users-table').innerHTML = '';
                    return;
                }
                
                // Отображаем статистику
                document.getElementById('stats').innerHTML = `
                    <div class="stat-card">
                        <div class="stat-label">Всего пользователей</div>
                        <div class="stat-value">${statsData.total_users}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Всего USDT</div>
                        <div class="stat-value">$${statsData.total_usdt.toFixed(2)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Всего SWAG</div>
                        <div class="stat-value">${statsData.total_swag.toFixed(2)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Активных ордеров</div>
                        <div class="stat-value">${statsData.active_orders}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Всего сделок</div>
                        <div class="stat-value">${statsData.total_trades}</div>
                    </div>
                `;
                
                // Загружаем список пользователей
                const usersRes = await fetch(`${SERVER_URL}/admin/users?user_id=${targetUserId}`);
                const usersData = await usersRes.json();
                
                if (usersData.error) {
                    document.getElementById('users-table').innerHTML = `<div class="error">❌ ${usersData.error}</div>`;
                    return;
                }
                
                // Отображаем таблицу пользователей
                let tableHtml = `
                    <table>
                        <thead>
                            <tr>
                                <th>ID пользователя</th>
                                <th>USDT</th>
                                <th>SWAG</th>
                                <th>USDT (заморожено)</th>
                                <th>SWAG (заморожено)</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                usersData.users.forEach(user => {
                    tableHtml += `
                        <tr>
                            <td>${user.user_id}</td>
                            <td>$${user.usdt.toFixed(2)}</td>
                            <td>${user.swag.toFixed(2)}</td>
                            <td>$${user.usdt_frozen.toFixed(2)}</td>
                            <td>${user.swag_frozen.toFixed(2)}</td>
                        </tr>
                    `;
                });
                
                tableHtml += `
                        </tbody>
                    </table>
                `;
                
                document.getElementById('users-table').innerHTML = tableHtml;
                
            } catch (e) {
                console.error('Ошибка загрузки админ-панели:', e);
                document.getElementById('users-table').innerHTML = '<div class="error">❌ Ошибка загрузки данных</div>';
            }
        }

        function loadWithManualId() {
            const manualId = document.getElementById('manualUserId').value.trim();
            if (manualId) {
                currentUserId = manualId;
                userInfo.innerHTML = `🔑 Ручной вход: ID ${manualId}`;
                loadAdminData(manualId);
            }
        }

        // Загружаем данные
        if (currentUserId) {
            loadAdminData(currentUserId);
        }

        // Обновляем каждые 30 секунд
        setInterval(() => {
            if (currentUserId) {
                loadAdminData(currentUserId);
            }
        }, 30000);
    </script>
</body>
</html>
